<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <title>Cartão de Visitas - Movili</title>
    <style>
        body {
            background: #0b0b0d;
            font-family: Inter, Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            width: 900px;
            height: 520px;
            display: flex;
            gap: 30px;
        }

        .side {
            flex: 1;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .04));
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
            padding: 40px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .side::after {
            content: "";
            position: absolute;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(255, 122, 0, .35), transparent 70%);
            bottom: -120px;
            right: -120px;
        }

        /* Header com logo + foto */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .logo {
            width: 140px;
            height: 60px;
            display: flex;
            align-items: center;
        }

        .logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .photo {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, .15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-top: 10px;
        }

        .brand span {
            color: #ff9c3d
        }

        .tag {
            margin-top: 6px;
            color: #b7b7bd;
            font-size: 14px;
            max-width: 320px;
        }

        .name {
            font-size: 26px;
            font-weight: 700;
            margin-top: 28px;
        }

        .role {
            color: #ff9c3d;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .info {
            color: #d0d0d4;
            line-height: 1.7;
            font-size: 16px;
        }

        .qr {
            width: 200px;
            height: 200px;
            background: #fff;
            padding: 10px;
            border-radius: 14px;
        }

        .qr-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .qr-text {
            margin-top: 14px;
            font-size: 14px;
            color: #b7b7bd;
            text-align: center;
            max-width: 220px;
        }

        .links {
            position: absolute;
            bottom: 30px;
            left: 40px;
            font-size: 14px;
            color: #b7b7bd;
        }
    </style>
</head>

<body>

    <div class="card">

        <!-- Frente do cartão -->
        <div class="side">

            <div class="header">

                <!-- Espaço para LOGO PNG -->
                <div class="logo">
                    <img src="/assets/img/logo.png" alt="Movili Tecnologia">
                </div>

                <!-- Espaço para FOTO -->
                <div class="photo">
                    <img src="foto-jonathan.jpg" alt="Jonathan Pequeno">
                </div>

            </div>

            <div class="brand">Movili <span>Tecnologia</span></div>

            <div class="tag">
                Marketing, comercial e tecnologia para empresas que querem crescer com estratégia.
            </div>

            <div class="name">Jonathan S. Pequeno</div>
            <div class="role">CEO</div>

            <div class="info">
                📧 jonathan@movili.net<br>
                📱 +55 61 99671-9511<br>
                🌐 movili.net
            </div>

            <div class="links">
                Soluções comerciais e em marketing
            </div>

        </div>

        <!-- Verso do cartão -->
        <div class="side">

            <div class="qr-wrap">

                <img class="qr"
                    src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://movili.net/jonathan"
                    alt="QR Code">

                <div class="qr-text">
                    Escaneie o QR Code para acessar todos os links da Movili
                </div>

            </div>

        </div>

    </div>

</body>

</html>
