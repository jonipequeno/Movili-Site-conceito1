<section class="movili-form-section">

<div class="movili-form-container">

<h2>Solicite um diagnóstico gratuito</h2>
<p>Preencha o formulário e fale diretamente com a Movili no WhatsApp.</p>

<form id="moviliWhatsForm">

<input type="text" id="nome" placeholder="Seu nome" required>

<input type="text" id="empresa" placeholder="Nome da empresa">

<select id="servico">

<option value="">Qual solução você procura?</option>
<option value="Criação de Site">Criação de Site</option>
<option value="Gestão de Tráfego Pago">Gestão de Tráfego Pago</option>
<option value="Social Media">Social Media</option>
<option value="Implantação de CRM">Implantação de CRM</option>
<option value="Assessoria Comercial">Assessoria Comercial</option>
<option value="Automação e Chatbots">Automação e Chatbots</option>

</select>

<textarea id="problema" placeholder="Descreva brevemente seu desafio"></textarea>

<button type="submit">
Falar com especialista no WhatsApp
</button>

</form>

</div>

</section>

<style>

.movili-form-section{
padding:80px 20px;
background:#0f0f0f;
display:flex;
justify-content:center;
}

.movili-form-container{

max-width:500px;
width:100%;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);

}

.movili-form-container h2{

color:#ff6a00;
margin-bottom:10px;
font-size:28px;

}

.movili-form-container p{

color:#555;
margin-bottom:25px;

}

.movili-form-container input,
.movili-form-container select,
.movili-form-container textarea{

width:100%;
padding:14px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;

}

.movili-form-container textarea{

height:100px;
resize:none;

}

.movili-form-container button{

width:100%;
padding:16px;
border:none;
border-radius:8px;
background:#ff6a00;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;

}

.movili-form-container button:hover{

background:#e45d00;

}

</style>

<script>

document.getElementById("moviliWhatsForm").addEventListener("submit", function(e){

e.preventDefault();

let nome = document.getElementById("nome").value;
let empresa = document.getElementById("empresa").value;
let servico = document.getElementById("servico").value;
let problema = document.getElementById("problema").value;

let mensagem = `Olá Movili! Gostaria de um atendimento.

Nome: ${nome}
Empresa: ${empresa}
Serviço: ${servico}
Desafio: ${problema}`;

let numero = "5561996719511";

let url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;

window.open(url, "_blank");

});

</script>
